# ~/.tmux.conf

# =============== 基础设置 ===============
set -g default-terminal "screen-256color"
set -sg escape-time 10
set -g history-limit 50000
set -as terminal-overrides ",xterm*:Tc"

# =============== 鼠标支持：只有拖拽才进入复制 ===============
set -g mouse on

# ---- root 表：彻底禁用点击 ----
unbind -T root MouseDown1Pane
unbind -T root SecondClick1Pane
unbind -T root DoubleClick1Pane
unbind -T root TripleClick1Pane
unbind -T root MouseDown3Pane

# 只保留拖拽进入 copy-mode
unbind -T root MouseDrag1Pane
bind   -T root MouseDrag1Pane copy-mode -M

# ---- copy-mode-vi：禁用点击/双击/三击，只保留拖拽选择 ----
unbind -T copy-mode-vi MouseDown1Pane
unbind -T copy-mode-vi SecondClick1Pane
unbind -T copy-mode-vi DoubleClick1Pane
unbind -T copy-mode-vi TripleClick1Pane
unbind -T copy-mode-vi MouseDrag1Pane
unbind -T copy-mode-vi MouseDragEnd1Pane

bind   -T copy-mode-vi MouseDrag1Pane    send-keys -X begin-selection
bind   -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-no-clear

# ---- copy-mode（emacs 表）也同步处理，防止残留 ----
unbind -T copy-mode MouseDown1Pane
unbind -T copy-mode SecondClick1Pane
unbind -T copy-mode DoubleClick1Pane
unbind -T copy-mode TripleClick1Pane
unbind -T copy-mode MouseDrag1Pane
unbind -T copy-mode MouseDragEnd1Pane

bind   -T copy-mode MouseDrag1Pane    send-keys -X begin-selection
bind   -T copy-mode MouseDragEnd1Pane send-keys -X copy-selection-no-clear

# =============== 快捷键优化 ===============
# unbind C-b
# set -g prefix C-a
# bind C-a send-prefix

unbind r
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

unbind |
unbind -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

unbind c
bind c new-window -c "#{pane_current_path}"

unbind '"'
unbind %
bind '"' split-window -v -c "#{pane_current_path}"
bind '%' split-window -h -c "#{pane_current_path}"

# 清屏 + 清空当前 pane 的 tmux 滚动历史
unbind k
unbind K
bind k confirm-before -p "Clear pane history? (y/n)" "send-keys C-l \; clear-history \; display-message 'Pane history cleared'"

# =============== 复制模式（Vim 风格 + 系统剪贴板） ===============
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection

# Linux (X11)
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -in -selection clipboard'

# Linux (Wayland)
# bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'wl-copy'

# macOS
# bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'pbcopy'

# =============== 状态栏美化 ===============
set -g status-interval 1
set -g status-style bg=colour235,fg=colour250

set -g status-left-length 20
set -g status-right-length 180

set -g status-left '#[fg=colour232,bg=colour39,bold] #S #[fg=colour39,bg=colour235,nobold]'

# 右侧：蓝绿色快捷键提示 + 时间 + 主机
set -g status-right '#[fg=colour235,bg=colour239,nobold]#[fg=colour250,bg=colour239] r reload #[fg=colour239,bg=colour31,nobold]#[fg=colour255,bg=colour31,bold] c new #[fg=colour31,bg=colour39,nobold]#[fg=colour232,bg=colour39,bold] | - split #[fg=colour39,bg=colour41,nobold]#[fg=colour232,bg=colour41,bold] k clear #[fg=colour41,bg=colour239,nobold]#[fg=colour250,bg=colour239] [ copy #[fg=colour239,bg=colour235,nobold]#[fg=colour250,bg=colour235] %Y-%m-%d %H:%M #[fg=colour239,bg=colour235] #H '

setw -g window-status-separator ''
setw -g window-status-format '#[fg=colour248,bg=colour235] #I:#W '
setw -g window-status-current-format '#[fg=colour232,bg=colour41] #I:#W #[fg=colour41,bg=colour235,nobold]'

# =============== 其他实用选项 ===============
setw -g automatic-rename on
set -g destroy-unattached off

set -g set-titles on
set -g set-titles-string '#T - #S (#P)'