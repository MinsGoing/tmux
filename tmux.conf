# ~/.tmux.conf — 优化版（tmux ≥ 3.0）

# =============== 基础设置 ===============
# 启用 UTF-8（即使 LOCALE 不是 UTF-8）
set -g default-terminal "screen-256color"
set -sg escape-time 10          # 快速响应快捷键
set -g history-limit 50000      # 增大滚动历史（默认 2000 太小）

# 允许终端使用真彩色（TrueColor）
set -g terminal-overrides "xterm*:Tc"

# =============== 鼠标支持（关键！） ===============
set -g mouse on                 # 启用鼠标：滚动、选择窗格、调整大小
# 拖拽结束后保留选区，不跳到底部
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-no-clear
bind -T copy-mode    MouseDragEnd1Pane send-keys -X copy-selection-no-clear

# 单击时清除黄色高亮
bind -T copy-mode-vi MouseDown1Pane select-pane \; send-keys -X clear-selection
bind -T copy-mode    MouseDown1Pane select-pane \; send-keys -X clear-selection
# =============== 快捷键优化 ===============
# 使用 Ctrl-a 作为 Prefix（类似 GNU Screen），不喜欢可注释掉
# unbind C-b
# set -g prefix C-a
# bind C-a send-prefix           # 连按两次 Ctrl-a 发送原 Ctrl-a

# 快速重新加载配置
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# 更直观的窗格分割
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %


# =============== 复制模式（Vim 风格 + 系统剪贴板） ===============
# 启用 Vi 模式（在复制模式中用 h/j/k/l 移动）
setw -g mode-keys vi

# 复制到系统剪贴板（需 xclip / wl-copy / pbcopy）
# Linux (X11)
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -in -selection clipboard'
# Linux (Wayland)
# bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'wl-copy'
# macOS
# bind - T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'pbcopy'

# 进入复制模式后，按 v 开始选择，y 复制
bind -T copy-mode-vi v send-keys -X begin-selection

# =============== 状态栏美化 ===============
set -g status-interval 1
set -g status-style bg=colour235,fg=colour250

# 左侧：会话名
set -g status-left-length 40
set -g status-left '#[fg=colour232,bg=colour39,bold] #S #[fg=colour39,bg=colour235,nobold]'

# 右侧：时间、日期、主机名
set -g status-right '#[fg=colour235,bg=colour239,nobold]#[fg=colour250,bg=colour239] %Y-%m-%d %H:%M #[fg=colour239,bg=colour235,nobold]#[fg=colour250,bg=colour235] #H '

# 窗口列表样式
setw -g window-status-format '#[fg=colour248,bg=colour235] #I:#W '
setw -g window-status-current-format '#[fg=colour232,bg=colour41] #I:#W #[fg=colour41,bg=colour235,nobold]'

# =============== 其他实用选项 ===============
# 新窗口/窗格继承当前路径
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# 自动重命名窗口（基于运行的命令）
setw -g automatic-rename on

# 退出所有会话时自动销毁
set -g destroy-unattached off

# 允许通过 SSH 远程连接时保持颜色和功能
set -g set-titles on
set -g set-titles-string '#T - #S (#P)'
