# ===============================================
# Tmux Configuration File
# ===============================================

# -----------------------------------------------
# General Settings
# -----------------------------------------------

# Set prefix to Ctrl+a (instead of Ctrl+b)
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Enable mouse support
set -g mouse on

# Start window numbering at 1 instead of 0
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Increase scrollback buffer size
set -g history-limit 10000

# Enable focus events
set -g focus-events on

# Set default terminal
set -g default-terminal "screen-256color"

# Enable true color support
set -ga terminal-overrides ",xterm-256color:Tc"

# Reduce escape time for faster command sequences
set -sg escape-time 0

# Increase repeat time for repeatable commands
set -g repeat-time 600

# Display messages for a longer time
set -g display-time 3000

# Refresh status bar more frequently
set -g status-interval 5

# -----------------------------------------------
# Key Bindings
# -----------------------------------------------

# Reload configuration file
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Split panes using | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Create new window with current path
bind c new-window -c "#{pane_current_path}"

# Switch panes using Alt+arrow without prefix
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Switch panes using vim-style keys
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes using vim-style keys
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Quick window selection
bind -r C-h select-window -t :-
bind -r C-l select-window -t :+

# -----------------------------------------------
# Copy Mode Settings
# -----------------------------------------------

# Use vim keybindings in copy mode
setw -g mode-keys vi

# Enter copy mode
bind Escape copy-mode

# Copy mode vim-style selection
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle

# -----------------------------------------------
# Status Bar
# -----------------------------------------------

# Enable status bar
set -g status on

# Status bar position
set -g status-position bottom

# Status bar colors
set -g status-style bg=colour234,fg=colour137

# Left status bar
set -g status-left-length 20
set -g status-left '#[fg=colour233,bg=colour245,bold] #S '

# Right status bar
set -g status-right-length 50
set -g status-right '#[fg=colour233,bg=colour241,bold] %d/%m #[fg=colour233,bg=colour245,bold] %H:%M:%S '

# Window status
setw -g window-status-current-style fg=colour81,bg=colour238,bold
setw -g window-status-current-format ' #I#[fg=colour250]:#[fg=colour255]#W#[fg=colour50]#F '

setw -g window-status-style fg=colour138,bg=colour235,none
setw -g window-status-format ' #I#[fg=colour237]:#[fg=colour250]#W#[fg=colour244]#F '

# -----------------------------------------------
# Pane Settings
# -----------------------------------------------

# Pane border colors
set -g pane-border-style fg=colour238
set -g pane-active-border-style fg=colour51

# -----------------------------------------------
# Message Settings
# -----------------------------------------------

# Message text colors
set -g message-style bg=colour235,fg=colour166

# -----------------------------------------------
# Activity Monitoring
# -----------------------------------------------

# Highlight window when it has new activity
setw -g monitor-activity on
set -g visual-activity off

# -----------------------------------------------
# Other Settings
# -----------------------------------------------

# Allow automatic renaming of windows
set -g allow-rename on

# Set window title
set -g set-titles on
set -g set-titles-string '#S:#I.#P #W'

# Enable aggressive resize
setw -g aggressive-resize on
